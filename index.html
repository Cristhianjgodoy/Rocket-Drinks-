<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Drinks — v2</title>
<style>body{margin:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;min-height:100vh;}</style>
</head>
<body>
<script>
(async function(){
  try{
    // Sempre busca o config publicado — garante que admin e visitantes vejam o mesmo
    const r=await fetch('rocket-config.json?t='+Date.now());
    if(r.ok){
      const cfg=await r.text();
      localStorage.setItem('rocketDrinksConfig',cfg);
    }
  }catch(e){}
  // Acesso direto ao admin via hash secreto
  var _h=location.hash;
  if(_h==='#_adm'){
    window.location.replace('rkd-29adfadd.html');
  } else {
    window.location.replace('orcamento-rocket-drinks.html'+(_h||''));
  }
})();
</script>
</body>
</html>
